<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps Intake Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Inter', sans-serif;
    background: #f6f8fb;
    margin: 0;
}

.container {
    max-width: 1000px;
    margin: 40px auto;
    background: #fff;
    padding: 40px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

h1 { color: #2563eb; }
h2 { margin-top: 30px; border-left: 4px solid #2563eb; padding-left: 10px; }

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
}

.full-width { grid-column: span 2; }

input, select, textarea {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
}

.checklist-box {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    background: #f1f5f9;
    padding: 20px;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 16px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    margin-top: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>DevOps Project Intake</h1>

<form action="https://formspree.io/f/mpqkkeeq" method="POST">

<!-- Formspree config -->
<input type="hidden" name="_subject" value="📄 DevOps Intake Report">
<input type="hidden" name="_template" value="table">

<!-- Section markers -->
<input type="hidden" name="--- Project Overview ---" value="---">

<h2>1. Project Overview</h2>

<div class="form-grid">
<input type="text" name="Project_Name" placeholder="Project Name" required>
<input type="text" name="Owner_Name" placeholder="Owner Name" required>
<input type="url" name="Repo_URL" placeholder="Repo URL">
<input type="text" name="Main_Branch" placeholder="Main Branch">
</div>

<input type="hidden" name="--- Hosting & Domain ---" value="---">

<h2>2. Hosting & Domain</h2>

<div class="form-grid">
<select name="Cloud_Provider">
<option value="Unsure">Unsure</option>
<option value="AWS">AWS</option>
<option value="GCP">GCP</option>
<option value="Azure">Azure</option>
<option value="DigitalOcean">DigitalOcean</option>
</select>

<input type="text" name="Domain_Name" placeholder="Domain Name">

<select name="Domain_Status" class="full-width">
<option value="Already_Owned">Already Owned</option>
<option value="Need_Purchase">Need Purchase</option>
<option value="Need_Transfer">Need Transfer</option>
<option value="Unsure">Unsure</option>
</select>
</div>

<input type="hidden" name="--- DevOps Lifecycle ---" value="---">

<h2>3. DevOps Lifecycle</h2>

<div class="checklist-box">
<label><input type="checkbox" name="Lifecycle[]" value="Version_Control"> Version Control</label>
<label><input type="checkbox" name="Lifecycle[]" value="Agile_Tools"> Agile Tools</label>
<label><input type="checkbox" name="Lifecycle[]" value="Coding_Standards"> Coding Standards</label>
<label><input type="checkbox" name="Lifecycle[]" value="Branching_Strategy"> Branching Strategy</label>
<label><input type="checkbox" name="Lifecycle[]" value="Build_Automation"> Build Automation</label>
<label><input type="checkbox" name="Lifecycle[]" value="CI_Pipelines"> CI/CD Pipelines</label>
<label><input type="checkbox" name="Lifecycle[]" value="Automated_Triggers"> Automated Triggers</label>
<label><input type="checkbox" name="Lifecycle[]" value="Artifact_Repo"> Artifact Repo</label>
<label><input type="checkbox" name="Lifecycle[]" value="Rollback_Strategy"> Rollback Strategy</label>
<label><input type="checkbox" name="Lifecycle[]" value="Backup_Strategy"> Backup Strategy</label>
<label><input type="checkbox" name="Lifecycle[]" value="IaC_Tools"> Infrastructure as Code</label>
<label><input type="checkbox" name="Lifecycle[]" value="Containerization"> Docker</label>
<label><input type="checkbox" name="Lifecycle[]" value="Orchestration"> Kubernetes</label>
<label><input type="checkbox" name="Lifecycle[]" value="Performance_Monitoring"> Monitoring</label>
<label><input type="checkbox" name="Lifecycle[]" value="Code_Scanning"> Security Scanning</label>
<label><input type="checkbox" name="Lifecycle[]" value="Secrets_Management"> Secrets Management</label>
</div>

<input type="hidden" name="--- Technical Specifications ---" value="---">

<h2>4. Technical Specifications</h2>

<div class="form-grid">
<textarea name="Stack_Details" class="full-width" placeholder="Stack details"></textarea>
<textarea name="Dependencies" placeholder="Dependencies"></textarea>
<textarea name="Database_Info" placeholder="Database info"></textarea>
<textarea name="Config_Files" placeholder="Config"></textarea>
<textarea name="Instructions" placeholder="Instructions"></textarea>
<input type="text" name="Access_Control" placeholder="Access control">
<input type="text" name="Retention" placeholder="Retention">
<textarea name="Remarks" class="full-width" placeholder="Remarks"></textarea>
</div>

<button type="submit">Submit Request</button>

</form>

</div>

</body>
</html>
